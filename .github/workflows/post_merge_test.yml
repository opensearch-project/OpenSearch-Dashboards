name: Post-merge tests

# Runs a focused subset of tests after merge to main and release branches.
# The full test suite runs on PRs via build_and_test_workflow.yml.
# This workflow catches issues from merge conflicts or squash-merge side effects
# that weren't in the PR's final commit, without duplicating the full PR suite.

on:
  push:
    branches: ['main', '[0-9]+\.x', '[0-9]+\.[0-9]+']

env:
  OSD_OPTIMIZER_THEMES: v8light
  TEST_BROWSER_HEADLESS: 1
  CI: 1
  GCS_UPLOAD_PREFIX: fake
  TEST_OPENSEARCH_DASHBOARDS_HOST: localhost
  TEST_OPENSEARCH_DASHBOARDS_PORT: 6610
  TEST_OPENSEARCH_TRANSPORT_PORT: 9403
  TEST_OPENSEARCH_PORT: 9400
  OSD_SNAPSHOT_SKIP_VERIFY_CHECKSUM: true
  OSD_OPTIMIZER_MAX_WORKERS: 8
  NODE_OPTIONS: '--max-old-space-size=8192 --max-semi-space-size=64 --dns-result-order=ipv4first'

jobs:
  lint-and-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Configure Yarn Cache
        run: echo "YARN_CACHE_LOCATION=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Restore Yarn Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.YARN_CACHE_LOCATION }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: yarn-Linux-

      - name: Run bootstrap
        shell: bash
        run: |
          for i in 1 2 3; do
            yarn osd bootstrap && exit 0
            echo "Bootstrap attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Run TypeScript error check
        run: yarn typecheck

      - name: Run linter
        run: yarn lint

  unit-tests:
    name: Jest unit tests (ciGroup${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Configure Yarn Cache
        run: echo "YARN_CACHE_LOCATION=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Restore Yarn Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.YARN_CACHE_LOCATION }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: yarn-Linux-

      - name: Run bootstrap
        shell: bash
        run: |
          for i in 1 2 3; do
            yarn osd bootstrap && exit 0
            echo "Bootstrap attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Run unit tests group ${{ matrix.group }}
        run: node scripts/jest --ci --colors --runInBand --ci-group=${{ matrix.group }}

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-post-merge-group${{ matrix.group }}
          path: target/junit/**/*.xml
          retention-days: 7
          if-no-files-found: ignore
          overwrite: true

      - name: Generate test failure summary
        if: failure()
        shell: bash
        run: node scripts/summarize_jest_failures.js

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      OSD_OPTIMIZER_MAX_WORKERS: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Configure Yarn Cache
        run: echo "YARN_CACHE_LOCATION=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Restore Yarn Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.YARN_CACHE_LOCATION }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: yarn-Linux-

      - name: Run bootstrap
        shell: bash
        run: |
          for i in 1 2 3; do
            yarn osd bootstrap && exit 0
            echo "Bootstrap attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Run integration tests
        run: yarn test:jest_integration:ci

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-post-merge-integration
          path: target/junit/**/*.xml
          retention-days: 7
          if-no-files-found: ignore
          overwrite: true

  build-min-artifact-linux-x64:
    name: Build Linux x64 release artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: ./artifacts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: './artifacts/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Configure Yarn Cache
        run: echo "YARN_CACHE_LOCATION=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Restore Yarn Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.YARN_CACHE_LOCATION }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: yarn-Linux-

      - name: Get package version
        run: |
          echo "VERSION=$(yarn --silent pkg-version)" >> $GITHUB_ENV

      - name: Run bootstrap
        run: |
          for i in 1 2 3; do
            yarn osd bootstrap && exit 0
            echo "Bootstrap attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Build Linux x64
        run: yarn build-platform --linux --skip-os-packages --release

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-${{ env.VERSION }}
          path: ./artifacts/target/opensearch-dashboards-${{ env.VERSION }}-linux-x64.tar.gz
          retention-days: 1
          overwrite: true

  build-min-artifact-other-platforms:
    name: Build release artifacts on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux ARM64
            ext: tar.gz
            suffix: linux-arm64
            script: build-platform --linux-arm --skip-os-packages
          - os: macos-latest
            name: macOS x64
            ext: tar.gz
            suffix: darwin-x64
            script: build-platform --darwin --skip-os-packages
          - os: macos-latest
            name: macOS ARM64
            ext: tar.gz
            suffix: darwin-arm64
            script: build-platform --darwin-arm --skip-os-packages
          - os: windows-latest
            name: Windows x64
            ext: zip
            suffix: windows-x64
            script: build-platform --windows --skip-os-packages
    defaults:
      run:
        working-directory: ./artifacts
    steps:
      - name: Configure git's autocrlf (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          git config --global core.autocrlf false
        working-directory: .

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: ./artifacts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: './artifacts/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Configure Yarn Cache
        shell: bash
        run: echo "YARN_CACHE_LOCATION=$(yarn cache dir)" >> $GITHUB_ENV

      - name: Restore Yarn Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.YARN_CACHE_LOCATION }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Get package version (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          echo "VERSION=$(yarn --silent pkg-version)" >> $GITHUB_ENV

      - name: Get artifact build name (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          echo "ARTIFACT_BUILD_NAME=opensearch-dashboards-${{ env.VERSION }}-${{ matrix.suffix }}.${{ matrix.ext }}" >> $GITHUB_ENV

      - name: Get package version (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "VERSION=$(yarn --silent pkg-version)" >> $env:GITHUB_ENV

      - name: Get artifact build name (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "ARTIFACT_BUILD_NAME=opensearch-dashboards-${{ env.VERSION }}-${{ matrix.suffix }}.${{ matrix.ext }}" >> $env:GITHUB_ENV

      - name: Run bootstrap
        shell: bash
        run: |
          for i in 1 2 3; do
            yarn osd bootstrap && exit 0
            echo "Bootstrap attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Build ${{ matrix.name }}
        run: yarn ${{ matrix.script }} --release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.suffix }}-${{ env.VERSION }}
          path: ./artifacts/target/${{ env.ARTIFACT_BUILD_NAME }}
          retention-days: 1
          overwrite: true

  bwc-tests:
    name: BWC tests (${{ matrix.version }})
    needs: [build-min-artifact-linux-x64]
    runs-on: ubuntu-latest
    container:
      image: docker://opensearchstaging/ci-runner:ci-runner-rockylinux8-opensearch-dashboards-integtest-v2
      options: --user 1001
    defaults:
      run:
        working-directory: ./artifacts
    strategy:
      fail-fast: false
      matrix:
        version:
          [
            osd_2.0.0,
            osd_2.1.0,
            osd_2.2.0,
            osd_2.3.0,
            osd_2.4.0,
            osd_2.5.0,
            osd_2.6.0,
            osd_2.7.0,
            osd_2.8.0,
            osd_2.9.0,
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: ./artifacts

      - run: echo Running backwards compatibility tests for version ${{ matrix.version }}
      - run: echo [NOTE] These tests will be ran using Linux x64 release builds without security

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: './artifacts/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Yarn
        run: |
          npm uninstall -g yarn
          npm i -g yarn@1.22.10
          yarn config set network-timeout 1000000 -g

      - name: Get package version
        run: |
          echo "VERSION=$(yarn --silent pkg-version)" >> $GITHUB_ENV

      - name: Set OpenSearch URL
        run: |
          echo "OPENSEARCH_URL=https://artifacts.opensearch.org/snapshots/core/opensearch/${{ env.VERSION }}-SNAPSHOT/opensearch-min-${{ env.VERSION }}-SNAPSHOT-linux-x64-latest.tar.gz" >> $GITHUB_ENV

      - name: Verify if OpenSearch is available for version
        id: verify-opensearch-exists
        run: |
          if curl -I -L ${{ env.OPENSEARCH_URL }}; then
            echo "version-exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Skipping tests
        if: steps.verify-opensearch-exists.outputs.version-exists != 'true'
        run: echo Tests were skipped because an OpenSearch release build does not exist for this version yet!

      - name: Setting environment variable to run tests for ${{ matrix.version }}
        if: steps.verify-opensearch-exists.outputs.version-exists == 'true'
        run: echo "BWC_VERSIONS=${{ matrix.version }}" >> $GITHUB_ENV

      - name: Download OpenSearch Dashboards
        uses: actions/download-artifact@v4
        id: download
        with:
          name: linux-x64-${{ env.VERSION }}
          path: ./artifacts/
        if: steps.verify-opensearch-exists.outputs.version-exists == 'true'

      - name: Run tests
        if: steps.verify-opensearch-exists.outputs.version-exists == 'true'
        run: |
          ./bwctest.sh -s false -o ${{ env.OPENSEARCH_URL }} -d ${{ steps.download.outputs.download-path }}/opensearch-dashboards-${{ env.VERSION }}-linux-x64.tar.gz

      - uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.verify-opensearch-exists.outputs.version-exists == 'true' }}
        with:
          name: ${{ matrix.version }}-test-failures
          path: |
            ./artifacts/bwc_tmp/test/cypress/videos/*
            ./artifacts/bwc_tmp/test/cypress/screenshots/*
            ./artifacts/bwc_tmp/test/cypress/results/*
          retention-days: 1
          overwrite: true

  # Create a GitHub issue when any post-merge job fails
  notify-on-failure:
    name: Create issue on failure
    needs: [lint-and-typecheck, unit-tests, integration-tests, build-min-artifact-linux-x64, build-min-artifact-other-platforms, bwc-tests]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${owner}/${repo}/commit/${context.sha}`;
            const shortSha = context.sha.substring(0, 7);

            await github.rest.issues.create({
              owner,
              repo,
              title: `Post-merge test failure on ${context.ref.replace('refs/heads/', '')} (${shortSha})`,
              body: [
                `## Post-merge test failure`,
                ``,
                `A post-merge test failed after a push to \`${context.ref.replace('refs/heads/', '')}\`.`,
                ``,
                `- **Commit:** [${shortSha}](${commitUrl})`,
                `- **Run:** [View workflow run](${runUrl})`,
                `- **Triggered by:** ${context.actor}`,
                ``,
                `Please investigate and fix or revert if necessary.`,
              ].join('\n'),
              labels: ['bug', 'ci'],
            });
